<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>요롼 - 내 주변 맛있는 요리가게 찾기</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons CDN -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Jua&family=Nanum+Gothic:wght@400;700;800&display=swap');
        
        body {
            font-family: 'Nanum Gothic', sans-serif;
            background-color: #f1f5f9;
            user-select: none;
            -webkit-user-select: none;
        }
        
        .jua-font {
            font-family: 'Jua', sans-serif;
        }

        /* 스케치에서 네가 그린 빛나는 노란색 글씨 느낌 */
        .sketch-title-glow {
            color: #fef08a; /* 노란색 */
            text-shadow: 
                -2px -2px 0 #0284c7,  
                 2px -2px 0 #0284c7,
                -2px  2px 0 #0284c7,
                 2px  2px 0 #0284c7,
                 0px  0px 10px rgba(253, 224, 71, 0.8);
            animation: gentle-float 3s infinite ease-in-out;
        }

        @keyframes gentle-float {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-3px) scale(1.02); }
        }

        /* 부드러운 스크롤 바 제거 */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* 터치 반응 및 모달 트랜지션 */
        .active-scale:active {
            transform: scale(0.97);
        }
    </style>
</head>
